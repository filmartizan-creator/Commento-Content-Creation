name: weekly-content-generation

permissions:
  contents: write

on:
  schedule:
    - cron: '0 18 * * 0'
  workflow_dispatch:
    inputs:
      week_label:
        description: 'Week label (e.g. Hafta 3)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run weekly content generation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          WEEK_LABEL="${{ github.event.inputs.week_label }}"
          if [ -z "$WEEK_LABEL" ]; then
            WEEK_LABEL="Hafta $(date +%V)"
          fi
          python scripts/run_weekly.py "$WEEK_LABEL"

      - name: Commit generated files
        run: |
          git config user.name "commento-bot"
          git config user.email "bot@commento.local"
          git add data/ output/
          git diff --staged --quiet || git commit -m "Auto content generation: $(date +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git merge origin/main -X ours -m "Merge remote-tracking branch" --no-edit && git push && break
            echo "Push failed, retrying... ($i)"
            sleep 5
          done
