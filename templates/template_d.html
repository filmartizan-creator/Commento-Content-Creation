<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');

  :root {
    --bg: #1B2A8F;
    --accent: #6B7AE8;
    --bubble: #EDEFFB;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-font-smoothing: antialiased; }

  html, body {
    width: 1080px;
    height: 1350px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  .logo {
    position: absolute;
    top: 64px;
    left: 70px;
    height: 56px;
  }

  .deco-big {
    position: absolute;
    top: -120px;
    right: -100px;
    width: 420px;
    height: 220px;
    background: rgba(255,255,255,0.05);
    border-radius: 60px 60px 60px 14px;
  }
  .deco-small {
    position: absolute;
    top: 130px;
    right: 40px;
    width: 160px;
    height: 84px;
    background: rgba(255,255,255,0.06);
    border-radius: 26px 26px 26px 6px;
  }

  .stat-number {
    position: absolute;
    top: 300px;
    left: 70px;
    right: 70px;
    font-weight: 900;
    font-size: 260px;
    line-height: 0.95;
    color: #FFFFFF;
    letter-spacing: -6px;
  }

  .stat-unit {
    font-size: 84px;
    font-weight: 700;
    color: var(--accent);
    vertical-align: super;
  }

  .label-bubble {
    position: absolute;
    top: 700px;
    left: 70px;
    right: 70px;
    background: var(--bubble);
    border-radius: 8px 28px 28px 28px;
    padding: 40px 44px;
  }
  .label-bubble::before {
    content: "";
    position: absolute;
    left: -22px; top: 36px;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 24px 20px 0;
    border-color: transparent var(--bubble) transparent transparent;
  }
  .label-bubble .stat-label {
    font-weight: 700;
    font-size: 38px;
    line-height: 1.3;
    color: #1B2A8F;
  }
  .label-bubble .subhead {
    margin-top: 16px;
    font-weight: 400;
    font-size: 28px;
    line-height: 1.5;
    color: #3A3A3F;
  }

  .cta {
    position: absolute;
    bottom: 80px;
    left: 70px;
    right: 70px;
    text-align: center;
    font-size: 26px;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
  }
</style>
</head>
<body>

  <div class="deco-big"></div>
  <div class="deco-small"></div>

  <img class="logo" src="../assets/logo_white.png">

  <div class="stat-number">{{STAT_NUMBER}}<span class="stat-unit">{{STAT_UNIT}}</span></div>

  <div class="label-bubble">
    <div class="stat-label">{{STAT_LABEL}}</div>
    <div class="subhead">{{SUBHEAD}}</div>
  </div>

  <div class="cta">{{CTA}}</div>

</body>
</html>
